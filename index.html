<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Mi Libreria</title>
</head>
<body>
    <div class="contenido">
        <div class="principal">
            <h1>MI LIBRERIA</h1>
            <button id="newbook">+ New Book</button>
        </div>
        <div id="libros"></div>
    </div>

    <dialog id="dialog">
        <form id="form">
            <h2>Nuevo Libro</h2>
            <label for="title">Título</label>
            <input type="text" id="title" placeholder="Titulo del libro" required>

            <label for="author">Autor</label>
            <input type="text" id="author" placeholder="Nombre del autor" required>

            <label for="pages">Páginas</label>
            <input type="number" id="pages" placeholder="Número de páginas" min="1" required>

            <div class="check-group">
                <input type="checkbox" id="read">
                <label for="read">Ya lo leí</label>
            </div>

            <div class="form-buttons">
                <button type="submit">Agregar</button>
                <button type="button" id="cancel">Cancelar</button>
            </div>
        </form>
    </dialog>
</body>
</html>
